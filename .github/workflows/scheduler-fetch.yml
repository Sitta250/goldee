name: Scheduler Fetch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduler endpoint
        env:
          SCHEDULER_URL: ${{ secrets.SCHEDULER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SCHEDULER_URL" ]; then
            echo "Missing required secret: SCHEDULER_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          echo "Calling scheduler endpoint..."
          response_file="$(mktemp)"
          status_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SCHEDULER_URL}")"

          echo "HTTP status: ${status_code}"
          echo "Response body:"
          cat "$response_file"

          if [ "$status_code" -ne 200 ]; then
            echo "Scheduler call failed with non-200 response."
            exit 1
          fi
