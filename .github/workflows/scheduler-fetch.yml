name: Scheduler Fetch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch GoldAPI and ingest normalized payload
        env:
          GOLDAPI_URL: ${{ secrets.GOLDAPI_URL }}
          GOLDAPI_API_KEY: ${{ secrets.GOLDAPI_API_KEY }}
          SCHEDULER_INGEST_URL: ${{ secrets.SCHEDULER_INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$GOLDAPI_URL" ]; then
            echo "Missing required secret: GOLDAPI_URL"
            exit 1
          fi

          if [ -z "$GOLDAPI_API_KEY" ]; then
            echo "Missing required secret: GOLDAPI_API_KEY"
            exit 1
          fi

          if [ -z "$SCHEDULER_INGEST_URL" ]; then
            echo "Missing required secret: SCHEDULER_INGEST_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          echo "1) Fetching upstream GoldAPI..."
          upstream_body_file="$(mktemp)"
          upstream_status_code="$(curl -sS -o "$upstream_body_file" -w "%{http_code}" \
            -X GET \
            -H "Accept: application/json, text/plain, */*" \
            -H "x-access-token: ${GOLDAPI_API_KEY}" \
            "${GOLDAPI_URL}")"

          echo "GoldAPI HTTP status: ${upstream_status_code}"
          echo "GoldAPI response preview (500):"
          tr '\n' ' ' < "$upstream_body_file" | cut -c1-500
          echo

          if [ "$upstream_status_code" -ne 200 ]; then
            echo "GoldAPI call failed with non-200 response."
            exit 1
          fi

          echo "2) Parsing and normalizing payload..."
          normalized_payload_file="$(mktemp)"
          node scripts/map-goldapi-to-ingest.js "$upstream_body_file" "$normalized_payload_file"

          echo "3) Posting normalized payload to ingest endpoint..."
          ingest_response_file="$(mktemp)"
          ingest_status_code="$(curl -sS -o "$ingest_response_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --data @"$normalized_payload_file" \
            "${SCHEDULER_INGEST_URL}")"

          echo "Ingest HTTP status: ${ingest_status_code}"
          echo "Ingest response body:"
          cat "$ingest_response_file"

          if [ "$ingest_status_code" -ne 200 ]; then
            echo "Ingest call failed with non-200 response."
            exit 1
          fi
