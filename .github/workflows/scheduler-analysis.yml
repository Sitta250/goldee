name: Scheduler Analysis

# Backup trigger for Vercel cron (see vercel.json primary 03:45 UTC / ~10:45 ICT).
# Most days this run will return status "skipped" because Vercel's cron already
# ran and the inputHash is unchanged. This workflow is only a safety net if
# Vercel's cron fails or is delayed.
on:
  schedule:
    - cron: "50 3 * * *"   # ~10:50 ICT — backup a few minutes after Vercel 10:45
  workflow_dispatch:

jobs:
  trigger-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production analysis cron
        env:
          ANALYSIS_CRON_URL: ${{ secrets.ANALYSIS_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$ANALYSIS_CRON_URL" ]; then
            echo "Missing required secret: ANALYSIS_CRON_URL (full URL e.g. https://your-app.vercel.app/api/scheduler/analysis)"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          echo "GET $ANALYSIS_CRON_URL"
          http_code="$(curl -sS -o /tmp/analysis_body.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${ANALYSIS_CRON_URL}")"

          echo "HTTP ${http_code}"
          cat /tmp/analysis_body.json
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Analysis trigger failed (non-2xx)."
            exit 1
          fi

          if ! jq -e '.ok == true' /tmp/analysis_body.json >/dev/null 2>&1; then
            echo "Response body missing ok:true (fatal analysis error)."
            exit 1
          fi

          echo "OK — analysis cron accepted."
