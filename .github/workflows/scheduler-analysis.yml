name: Scheduler Analysis

# Backup + retry for Vercel crons (see vercel.json primary 02:30 / 11:00 UTC).
# Stagger 5m after Vercel so the first success usually wins; retries 1h later catch missed/failed runs.
on:
  schedule:
    - cron: "35 2 * * *"   # ~09:35 ICT — backup after Vercel 09:30
    - cron: "5 11 * * *"   # ~18:05 ICT — backup after Vercel 18:00
    - cron: "30 3 * * *"   # ~10:30 ICT — retry window (morning)
    - cron: "0 12 * * *"   # ~19:00 ICT — retry window (evening)
  workflow_dispatch:

jobs:
  trigger-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production analysis cron
        env:
          ANALYSIS_CRON_URL: ${{ secrets.ANALYSIS_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$ANALYSIS_CRON_URL" ]; then
            echo "Missing required secret: ANALYSIS_CRON_URL (full URL e.g. https://your-app.vercel.app/api/scheduler/analysis)"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          echo "GET $ANALYSIS_CRON_URL"
          http_code="$(curl -sS -o /tmp/analysis_body.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${ANALYSIS_CRON_URL}")"

          echo "HTTP ${http_code}"
          cat /tmp/analysis_body.json
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Analysis trigger failed (non-2xx)."
            exit 1
          fi

          if ! jq -e '.ok == true' /tmp/analysis_body.json >/dev/null 2>&1; then
            echo "Response body missing ok:true (fatal analysis error)."
            exit 1
          fi

          echo "OK — analysis cron accepted."
